# GitHub's built-in static security analysis engine.

# Unlike Checkstyle (style) or SonarCloud (quality + some security), CodeQL models actual data flows through our code
# to find security vulnerabilities — SQL injection paths, null dereferences from untrusted input, resource leaks, and
# similar patterns.

# Workflow name — user defined - can be any descriptive name.
name: CodeQL

# Runs on every push to main and PRs targeting main (same as ci.yml), plus a weekly schedule every Monday at 6am UTC.
# The schedule is important — new CVE patterns are discovered continuously. Code that was safe last month might match a
# newly disclosed vulnerability pattern next month. The weekly run catches this even when no code changes.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]
  schedule:
    # Every Monday at 6:00 AM UTC - catches newly disclosed CVEs.
    - cron: '0 6 * * 1'

jobs:
  # Job ID - user defined — can be any descriptive name.
  codeql-security-scan:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    # Explicit permissions required.
    permissions:
      # Allows the workflow to publish the findings to GitHub's Security tab for vulnerability reporting.
      security-events: write
      # Allows the workflow to read workflow run metadata, which helps CodeQL for incremental analysis optimization.
      actions: read
      # Allows the workflow to read repository source code, configuration files, etc. for analysis.
      contents: read

    steps:

      # Step-1 - Checkout the repository.
      - name: Checkout Repository
        # Use checkout@v7.0.0 GitHub Action to clone the repository into the runner workspace (GITHUB_WORKSPACE).
        uses: actions/checkout@v7.0.0

      # Step-2 - Check for Java source files.
      - name: Check For Java Source Files
        id: check-java
        # CodeQL analysis fails if the repository does not have any source code. So check if there are any Java source
        # files in the repository and set the has_java_code flag accordingly. Also store the flag in the GITHUB_OUTPUT
        # environment variable, so it can be used by other steps.
        run: |
          if [ -d src ] && find src -name "*.java" -type f | grep -q .; then
            echo "has_java_code=true" >> $GITHUB_OUTPUT
            echo "🟢 Java source code found. Proceeding with the next step (Setup JDK 21)."
          else
            echo "has_java_code=false" >> $GITHUB_OUTPUT
            echo "🔴 No Java source code found. Skipping subsequent steps."
          fi        

      # Step-3 - Setup JDK.
      - name: Setup JDK 21
        if: steps.check-java.outputs.has_java_code == 'true'
        # Use setup-java@v5.3.0 GitHub Action to install and configure the specified JDK in the runner.
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          # Cache the maven dependencies (from the ~/.m2/repository directory) in the runner.
          cache: maven

      # Step-4 - Initialize CodeQL.
      - name: Initialize CodeQL
        if: steps.check-java.outputs.has_java_code == 'true'
        # Use codeql-action/init GitHub Action to initialize CodeQL with language extractors and build configuration.
        uses: github/codeql-action/init@v4.36.2
        with:
          # Tells CodeQL which language extractor to use.
          languages: java

      # Step-5 - Build code - skip tests.
      - name: Build Code For CodeQL Analysis
        if: steps.check-java.outputs.has_java_code == 'true'
        # Compiles the code so CodeQL has bytecode to analyze. Tests are skipped.
        run: mvn compile -DskipTests

      # Step-6 - Perform CodeQL analysis.
      - name: Perform CodeQL Analysis
        if: steps.check-java.outputs.has_java_code == 'true'
        # Use codeql-action/analyze GitHub Action to run the actual analysis, upload the findings to the Security tab.
        # Any vulnerabilities found appear there but not as a build failure — CodeQL findings are advisory by default.
        uses: github/codeql-action/analyze@v4.36.2
